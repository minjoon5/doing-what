<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지금 민둥 뭐해?</title>
    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f7fa;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 450px;
            max-width: 90%;
            position: relative;
            /* 버튼과 겹치지 않도록 상단 패딩 추가 */
            padding-top: 4rem; 
        }

        .admin-login-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: 1px solid #ddd;
            color: #999;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            z-index: 10;
        }

        .notice-box {
            background: #fff9db;
            border-left: 4px solid #fcc419;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #856404;
            text-align: left;
            word-break: break-all;
            /* 버튼 아래에 위치하도록 보장 */
            clear: both;
        }

        h2 { font-size: 1.5rem; color: #333; margin-bottom: 20px; font-weight: 600; }

        .info-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }

        #fullDateDisplay {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .call-status {
            font-size: 1.1rem;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .status-available { color: #28a745; background: #e8f5e9; }
        .status-unavailable { color: #dc3545; background: #fdecea; }

        .location-display {
            font-size: 2.2rem;
            font-weight: 700;
            color: #007bff;
            margin: 10px 0;
        }

        #syncStatus { font-size: 0.75rem; margin-top: 10px; color: #007bff; font-weight: 500; }

        #adminPanel { display: none; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #eee; }
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .option-btn {
            padding: 12px;
            border: 1px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Pretendard';
        }
        .option-btn.active { background: #007bff; color: white; }
        
        #noticeInput {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .logout-btn { margin-top: 20px; background: #f0f0f0; color: #666; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }

        .copyright {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="admin-login-btn" id="loginBtn" onclick="login()">관리자 로그인</button>
        
        <div id="noticeDisplay" class="notice-box">공지사항을 불러오는 중...</div>

        <h2>지금 민둥 뭐해?</h2>

        <div class="info-box">
            <div id="fullDateDisplay">0000/00/00 - 00:00:00 - 요일</div>
            <div id="callStatus" class="call-status">연결 중...</div>
            <div style="color:#888; font-size: 0.9rem; margin-top: 10px;">나 지금</div>
            <div id="currentLocation" class="location-display">불러오는 중...</div>
        </div>

        <div id="syncStatus">서버 시간 확인 중...</div>

        <div id="adminPanel">
            <h3 style="font-size: 1rem; color: #333; margin-bottom: 5px;">관리자 설정</h3>
            <div style="text-align: left; margin-top: 15px;">
                <label style="font-size: 0.85rem; font-weight: 600;">공지사항 수정:</label>
                <input type="text" id="noticeInput" placeholder="공지 내용을 입력하세요">
                <button class="option-btn" style="width: 100%; margin-top: 5px; padding: 8px;" onclick="updateNotice()">공지 적용</button>
            </div>
            <div class="option-grid" id="optionGrid"></div>
            <button class="logout-btn" onclick="logout()">관리자 모드 종료</button>
        </div>
    </div>

    <div class="copyright">
        copyright (c) 2026. 민준<br>
        All rights reserved.
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkKhwUxNBkYBwj_1VzX1Bac5A63lueFes",
            authDomain: "doing-what-1.firebaseapp.com",
            projectId: "doing-what-1",
            storageBucket: "doing-what-1.firebasestorage.app",
            messagingSenderId: "110387695769",
            appId: "1:110387695769:web:572cf6c8486d6b0f2c6808",
            databaseURL: "https://doing-what-1-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const locRef = ref(db, 'minjoon/location');
        const noticeRef = ref(db, 'minjoon/notice');

        let timeOffset = 0;
        let currentLocation = '알 수 없음';
        let isAdmin = false;

        const options = ['학교', '짐 정리 중', '샤워 중', '머리 감는 중', '화장실', '1층 로비', '쉬는 중', '공부 중'];
        const grid = document.getElementById('optionGrid');
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => set(locRef, opt);
            grid.appendChild(btn);
        });

        onValue(locRef, (snapshot) => {
            currentLocation = snapshot.val() || '알 수 없음';
            updateDisplay();
        });

        onValue(noticeRef, (snapshot) => {
            const noticeText = snapshot.val() || '등록된 공지사항이 없습니다.';
            document.getElementById('noticeDisplay').innerText = `📢 ${noticeText}`;
            document.getElementById('noticeInput').value = snapshot.val() || '';
        });

        window.updateNotice = function() {
            const newNotice = document.getElementById('noticeInput').value;
            set(noticeRef, newNotice);
            alert("공지사항이 업데이트되었습니다.");
        };

        async function syncServerTime() {
            const syncLabel = document.getElementById('syncStatus');
            const apis = [
                'https://worldtimeapi.org/api/timezone/Asia/Seoul',
                'https://timeapi.io/api/Time/current/zone?timeZone=Asia/Seoul'
            ];

            for (let api of apis) {
                try {
                    const res = await fetch(api);
                    const data = await res.json();
                    const serverTime = new Date(data.datetime || data.dateTime).getTime();
                    timeOffset = serverTime - Date.now();
                    syncLabel.innerText = "● 서버 시간 동기화 완료";
                    syncLabel.style.color = "#28a745";
                    return;
                } catch (e) { continue; }
            }
            syncLabel.innerText = "○ 동기화 실패 (기기 시간 사용)";
            syncLabel.style.color = "#dc3545";
        }

        function updateDisplay() {
            const now = new Date(Date.now() + timeOffset);
            const h = now.getHours();
            const m = now.getMinutes();
            const day = now.getDay();
            const isWeekend = (day === 0 || day === 6);
            
            const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
            const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
            const dayName = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'][day];
            document.getElementById('fullDateDisplay').innerText = `${dateStr} - ${timeStr} - ${dayName}`;

            const currentTotalMinutes = (h * 60) + m;
            let canCall = true;
            if (!isWeekend && currentTotalMinutes >= 410) canCall = false;
            else if (isWeekend && currentTotalMinutes >= 430) canCall = false;

            const callStatusEl = document.getElementById('callStatus');
            callStatusEl.innerText = canCall ? "📞 전화 가능" : "🚫 전화 불가능";
            callStatusEl.className = `call-status ${canCall ? 'status-available' : 'status-unavailable'}`;
            document.getElementById('currentLocation').innerText = currentLocation;

            if (isAdmin) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.innerText === currentLocation);
                });
            }
        }

        window.login = function() {
            if (prompt("비밀번호를 입력하세요.") === "6402") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                updateDisplay();
            }
        };

        window.logout = function() {
            isAdmin = false;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('loginBtn').style.display = 'block';
        };

        syncServerTime();
        setInterval(updateDisplay, 1000);
        setInterval(syncServerTime, 300000);
    </script>
</body>
</html>
