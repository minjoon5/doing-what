<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지금 민둥 뭐해?</title>
    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f7fa;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 450px;
            max-width: 90%;
            position: relative;
        }

        .admin-login-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid #ddd;
            color: #999;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            z-index: 10;
        }

        h2 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }

        #fullDateDisplay {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .call-status {
            font-size: 1.1rem;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .status-available { color: #28a745; background: #e8f5e9; }
        .status-unavailable { color: #dc3545; background: #fdecea; }

        .location-display {
            font-size: 2.2rem;
            font-weight: 700;
            color: #007bff;
            margin: 10px 0;
        }

        #syncStatus {
            font-size: 0.75rem;
            margin-top: 10px;
            color: #007bff;
            transition: opacity 0.5s;
        }

        /* 관리자 영역 */
        #adminPanel {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
        }

        .option-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .option-btn {
            padding: 12px;
            border: 1px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Pretendard';
            transition: all 0.2s;
        }

        .option-btn.active { 
            background: #007bff; 
            color: white; 
        }

        .logout-btn {
            margin-top: 20px;
            background: #f0f0f0;
            color: #666;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="admin-login-btn" id="loginBtn" onclick="login()">관리자 로그인</button>
        
        <h2>지금 민둥 뭐해?</h2>

        <div class="info-box">
            <div id="fullDateDisplay">0000/00/00 00:00:00 요일</div>
            <div id="callStatus" class="call-status">시간 동기화 중...</div>
            <div style="color:#888; font-size: 0.9rem; margin-top: 10px;">나 지금</div>
            <div id="currentLocation" class="location-display">알 수 없음</div>
        </div>

        <div id="syncStatus">서버 시간 동기화 중...</div>

        <div id="adminPanel">
            <h3 style="font-size: 1rem; color: #333; margin-bottom: 5px;">상태 설정 (관리자)</h3>
            <div class="option-grid">
                <button class="option-btn" onclick="setLocation('학교')">학교</button>
                <button class="option-btn" onclick="setLocation('짐 정리 중')">짐 정리 중</button>
                <button class="option-btn" onclick="setLocation('샤워 중')">샤워 중</button>
                <button class="option-btn" onclick="setLocation('머리 감는 중')">머리 감는 중</button>
                <button class="option-btn" onclick="setLocation('화장실')">화장실</button>
                <button class="option-btn" onclick="setLocation('1층 로비')">1층 로비</button>
                <button class="option-btn" onclick="setLocation('쉬는 중')">쉬는 중</button>
                <button class="option-btn" onclick="setLocation('공부 중')">공부 중</button>
            </div>
            <button class="logout-btn" onclick="logout()">관리자 모드 종료</button>
        </div>
    </div>

    <script>
        let timeOffset = 0;
        let currentLocation = localStorage.getItem('minjoon_loc') || '알 수 없음';
        let isAdmin = false;

        const timeApis = [
            async () => {
                const res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Seoul');
                const data = await res.json();
                return new Date(data.datetime).getTime();
            },
            async () => {
                const res = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Seoul');
                const data = await res.json();
                return new Date(data.dateTime).getTime();
            }
        ];

        async function syncServerTime() {
            const syncLabel = document.getElementById('syncStatus');
            for (const api of timeApis) {
                try {
                    const start = Date.now();
                    const serverTime = await api();
                    const end = Date.now();
                    const latency = (end - start) / 2;
                    timeOffset = (serverTime + latency) - Date.now();
                    syncLabel.innerText = "● 서버 시간 동기화 완료";
                    syncLabel.style.color = "#4caf50";
                    setTimeout(() => syncLabel.style.opacity = '0.3', 5000);
                    return;
                } catch (e) {
                    console.error("Sync error:", e);
                }
            }
            syncLabel.innerText = "○ 동기화 실패 (로컬 시간 사용)";
            syncLabel.style.color = "#ff4d4f";
        }

        function updateDisplay() {
            const now = new Date(Date.now() + timeOffset);
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const h = now.getHours();
            const m = now.getMinutes();
            const s = String(now.getSeconds()).padStart(2, '0');
            const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            const dayName = days[now.getDay()];
            
            document.getElementById('fullDateDisplay').innerText = 
                `${year}/${month}/${date}   ${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${s}   ${dayName}`;

            const callStatusEl = document.getElementById('callStatus');
            let canCall = true;
            const isWeekend = (now.getDay() === 0 || now.getDay() === 6);
            const currentTotalMinutes = (h * 60) + m;

            if (!isWeekend) { 
                if (currentTotalMinutes >= 410) canCall = false;
            } else { 
                if (currentTotalMinutes >= 430) canCall = false;
            }

            if (canCall) {
                callStatusEl.innerText = "📞 전화 가능";
                callStatusEl.className = "call-status status-available";
            } else {
                callStatusEl.innerText = "🚫 전화 불가능";
                callStatusEl.className = "call-status status-unavailable";
            }

            document.getElementById('currentLocation').innerText = currentLocation;
            
            if(isAdmin) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.innerText === currentLocation);
                });
            }
        }

        function setLocation(loc) {
            currentLocation = loc;
            localStorage.setItem('minjoon_loc', loc);
            updateDisplay();
        }

        function login() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === "6402") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                updateDisplay();
            } else if (pw !== null) {
                alert("비밀번호가 틀렸습니다.");
            }
        }

        function logout() {
            isAdmin = false;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('loginBtn').style.display = 'block';
        }

        syncServerTime();
        setInterval(syncServerTime, 60000);
        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>
</body>
</html>
